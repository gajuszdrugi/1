    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
        
        #player-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video, iframe, audio { width: 100%; height: 100%; border: none; background-color: #000; }

        #trigger-zone { position: absolute; left: 0; top: 0; width: 30px; height: 100%; z-index: 9999; }
        
        #sidebar {
            position: absolute; left: -300px; top: 0; width: 300px; height: 100%;
            background: rgba(0,0,0,0.95); transition: left 0.3s; z-index: 10000;
            overflow-y: auto; padding: 20px 10px; border-right: 1px solid #333;
            scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar { display: none; }
        #trigger-zone:hover + #sidebar, #sidebar:hover { left: 0; }

        .channel-item { padding: 12px; margin-bottom: 5px; background: #1a1a1a; border-radius: 5px; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .channel-item:hover { background: #333; }
        .channel-item.active { background: #ff333d; color: #fff; }
        .channel-number { font-weight: bold; margin-right: 10px; min-width: 30px; }

        #channel-display {
            position: absolute; left: 20px; top: 20px; padding: 10px 20px;
            background: rgba(0,0,0,0.7); color: white; border-radius: 5px;
            z-index: 9998; font-size: 1.2rem; pointer-events: none; opacity: 0;
            transition: opacity 0.5s;
        }
        #channel-display.show { opacity: 1; }

        #fullscreen-btn {
            position: absolute; right: 20px; bottom: calc(20px + 57px); padding: 12px 20px;
            background: rgba(0,0,0,0.7); border: 1px solid #fff; color: white;
            border-radius: 5px; cursor: pointer; z-index: 999; transition: opacity 0.5s;
        }
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="trigger-zone"></div>
    <div id="sidebar"><ul id="channels-ul"></ul></div>
    <div id="video-target" style="width:100%; height:100%;"></div>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">PEŁNY EKRAN</button>

const channelsUl = document.getElementById('channels-ul');
const videoTarget = document.getElementById('video-target');
const channelDisplay = document.getElementById('channel-display');
let currentHls = null, currentDash = null, ytPlayer = null, fadeTimeout, displayTimeout, currentChannelIndex = 0;

channels.forEach((ch, i) => {
    const li = document.createElement('li');
    li.className = 'channel-item';
    li.dataset.index = i;
    li.innerHTML = `<span class="channel-number">${i+1}</span>${ch.name}`;
    li.onclick = () => loadChannel(ch, i);
    channelsUl.appendChild(li);
});

function loadChannel(ch, index = currentChannelIndex) {
    currentChannelIndex = index;
    videoTarget.innerHTML = "";
    if(currentHls) { currentHls.destroy(); currentHls = null; }
    if(currentDash) { currentDash.reset(); currentDash = null; }
    if(ytPlayer) { try{ytPlayer.destroy()}catch(e){} ytPlayer = null; }

    // Update Playlist UI
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.channel-item[data-index="${index}"]`).classList.add('active');

    // Display Name in corner
    channelDisplay.textContent = ch.name;
    channelDisplay.classList.add('show');
    clearTimeout(displayTimeout);
    displayTimeout = setTimeout(() => channelDisplay.classList.remove('show'), 7000);

    if(ch.type === 'hls') {
        videoTarget.innerHTML = `<video id="v" controls autoplay></video>`;
        const v = document.getElementById('v');
        currentHls = new Hls(); currentHls.loadSource(ch.url); currentHls.attachMedia(v);
    } else if(ch.type === 'dash') {
        videoTarget.innerHTML = `<video id="v" controls autoplay></video>`;
        currentDash = dashjs.MediaPlayer().create(); currentDash.initialize(document.getElementById('v'), ch.url, true);
    } else if(ch.type === 'youtube') {
        videoTarget.innerHTML = `<div id="yt-div"></div>`;
        ytPlayer = new YT.Player('yt-div', { videoId: ch.url, playerVars: {autoplay: 1} });
    } else if(ch.type === 'iframe' || ch.type === 'iframe-dlhd') {
        videoTarget.innerHTML = `<iframe src="${ch.url}" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>`;
    } else if(ch.type === 'audio') {
        videoTarget.innerHTML = `<audio controls autoplay src="${ch.url}"></audio>`;
    }
}

function nextChannel() {
    currentChannelIndex = (currentChannelIndex + 1) % channels.length;
    loadChannel(channels[currentChannelIndex], currentChannelIndex);
}

function previousChannel() {
    currentChannelIndex = (currentChannelIndex - 1 + channels.length) % channels.length;
    loadChannel(channels[currentChannelIndex], currentChannelIndex);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) document.getElementById('player-container').requestFullscreen();
    else document.exitFullscreen();
}

function resetFade() {
    document.getElementById('fullscreen-btn').classList.remove('fade-out');
    clearTimeout(fadeTimeout);
    fadeTimeout = setTimeout(() => document.getElementById('fullscreen-btn').classList.add('fade-out'), 3000);
}
document.onmousemove = resetFade;

loadChannel(channels[0], 0);

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("mousedown", function(e){
 if(e.button===2){e.preventDefault();nextChannel();}
 else if(e.button===1){e.preventDefault();previousChannel();}
});
